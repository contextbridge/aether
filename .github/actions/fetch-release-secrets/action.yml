name: Fetch Release Secrets
description: Fetches release environment variables from AWS SSM Parameter Store

inputs:
  aws-region:
    description: 'AWS region where secrets are stored'
    required: false
    default: 'us-west-2'
  role-to-assume:
    description: 'IAM role ARN to assume for secrets access'
    required: true
  parameter-path:
    description: 'SSM parameter path prefix'
    required: false
    default: '/aether/ci/release/env-vars'

runs:
  using: 'composite'
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Fetch secrets from SSM
      shell: bash
      run: |
        set -euo pipefail

        PARAM_PATH="${{ inputs.parameter-path }}"

        PARAMS=$(aws ssm get-parameters-by-path \
          --path "$PARAM_PATH" \
          --recursive \
          --with-decryption \
          --query 'Parameters[*].[Name,Value]' \
          --output text)

        if [ -z "$PARAMS" ]; then
          echo "::error::No parameters found under path: $PARAM_PATH"
          exit 1
        fi

        while IFS=$'\t' read -r name value; do
          env_var="${name##*/}"

          echo "::add-mask::$value"

          {
            echo "${env_var}<<EOF_${env_var}"
            echo "$value"
            echo "EOF_${env_var}"
          } >> "$GITHUB_ENV"

          echo "Exported: $env_var"
        done <<< "$PARAMS"
