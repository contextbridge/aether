[package]
name = "aether-llm-codegen"
version = "0.2.7"
edition = "2024"
description = "Code generation utilities for the Aether LLM provider layer"
license = "MIT"
repository = "https://github.com/contextbridge/aether"
readme = "README.md"
keywords = ["aether", "llm", "codegen"]
categories = ["development-tools"]

[package.metadata.dist]
dist = false

[lib]
name = "llm_codegen"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
prettyplease = "0.2.37"
proc-macro2 = "1.0.106"
quote = "1.0.45"
serde = { workspace = true }
serde_json = { workspace = true }
syn = { version = "2.0.117", features = ["full"] }

[dev-dependencies]
tempfile = { workspace = true }
utils = { package = "aether-utils", path = "../utils", version = "0.2.4" }
