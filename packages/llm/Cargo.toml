[package]
name = "aether-llm"
version = "0.3.0"
edition = "2024"
description = "Multi-provider LLM abstraction layer for the Aether AI agent framework"
license = "MIT"
repository = "https://github.com/contextbridge/aether"
readme = "README.md"
keywords = ["llm", "ai", "aether", "openai", "anthropic"]
categories = ["api-bindings", "asynchronous"]

[package.metadata.dist]
dist = false

[lib]
name = "llm"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = []
bedrock = ["dep:aws-config", "dep:aws-sdk-bedrockruntime", "dep:aws-smithy-types", "dep:base64"]
oauth = [
    "dep:rmcp",
    "dep:oauth2",
    "dep:async-trait",
    "dep:keyring-core",
    "dep:apple-native-keyring-store",
    "dep:windows-native-keyring-store",
    "dep:dbus-secret-service-keyring-store",
    "dep:url",
]
codex = ["oauth", "dep:base64"]

[dependencies]
async-openai = { workspace = true }
async-stream = { workspace = true }
aws-config = { workspace = true, optional = true }
aws-sdk-bedrockruntime = { workspace = true, optional = true }
aws-smithy-types = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
chrono = { workspace = true }
eventsource-stream = { workspace = true }
reqwest = { workspace = true }
futures = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }

schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

tracing = { workspace = true }

utils = { package = "aether-utils", path = "../utils", version = "0.2.3" }

# OAuth/Codex deps
rmcp = { workspace = true, optional = true }
oauth2 = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
keyring-core = { workspace = true, optional = true }
url = { workspace = true, optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store = { workspace = true, optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows-native-keyring-store = { workspace = true, optional = true }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
dbus-secret-service-keyring-store = { workspace = true, optional = true }

[build-dependencies]
llm-codegen = { package = "aether-llm-codegen", path = "../llm-codegen", version = "0.2.5" }

[dev-dependencies]
tempfile = { workspace = true }
